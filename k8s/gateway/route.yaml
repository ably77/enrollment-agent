apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wgu-enrollment
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /openai
    backendRefs:
    - name: openai
      group: agentgateway.dev
      kind: AgentgatewayBackend
    timeouts:
      request: "120s"
