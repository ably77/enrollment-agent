# Token-level rate limiting — 10,000 tokens per hour per user.
# Demonstrates AI cost governance: per-agent or per-team budgets.
# Set high enough for normal demo use; lower to 500 to demonstrate rate limiting.
apiVersion: ratelimit.solo.io/v1alpha1
kind: RateLimitConfig
metadata:
  name: wgu-enrollment-token-limit
  namespace: agentgateway-system
spec:
  raw:
    descriptors:
    - key: generic_key
      value: wgu-enrollment
      rateLimit:
        requestsPerUnit: 100000
        unit: HOUR
    rateLimits:
    - actions:
      - genericKey:
          descriptorValue: wgu-enrollment
      type: TOKEN
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: wgu-enrollment-rate-limit
  namespace: agentgateway-system
spec:
  targetRefs:
  - name: wgu-enrollment
    group: gateway.networking.k8s.io
    kind: HTTPRoute
  traffic:
    entRateLimit:
      global:
        rateLimitConfigRefs:
        - name: wgu-enrollment-token-limit
